version: 2

project_name: dep-fetch

before:
  hooks:
    - go mod tidy

builds:
  - id: dep-fetch
    main: .
    binary: dep-fetch
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/rancher/dep-fetch/internal/version.Version={{.Version}}
      - -X github.com/rancher/dep-fetch/internal/version.Commit={{.Commit}}
      - -X github.com/rancher/dep-fetch/internal/version.BuildTime={{.Date}}

# Produce raw binaries (no archives) so the default {name}_{os}_{arch} template
# in .bin-deps.yaml works without needing a tar path override.
archives:
  - id: dep-fetch
    builds:
      - dep-fetch
    format: binary
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"


release:
  prerelease: auto
  draft: true

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
